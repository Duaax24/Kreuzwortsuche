<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kreuzworträtsel</title>
  <link rel="stylesheet" href="style.css">

  <!-- Script mit defer (WICHTIG!) -->
  <script src="script.js" defer></script>
</head>

<body>

<h1>Kreuzworträtsel Thema: ...</h1>

<div id="game-wrapper">
  <div id="game-container">
    <!-- 10x10 Grid -->
  </div>
</div>

<div id="words-list">
  <h2>Wörter suchen:</h2>
  <ul id="words-to-find"></ul>
</div>

<div id="message"></div>

<div id="score">
  Punkte: <span id="score-value">0</span>
</div>

<!-- Logo unten links -->
<div id="logo-container">
  <img src="AHK Logo.png" alt="AHK Logo" id="ahk-logo">
</div>

<!-- 🎉 POPUP -->
<div id="popup">
  <div id="popup-content">
    <h2>🎉 Herzlichen Glückwunsch!</h2>
    <p>Du hast alle Wörter gefunden!</p>
    <button onclick="restartGame()">Nochmal spielen</button>
  </div>
</div>

</body>
</html>
